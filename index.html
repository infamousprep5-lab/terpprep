const STORAGE_KEY = 'terp-prep-progress-v1';
const subjects = [ela, misa, government];

const themes = {
  ela: { soft: 'bg-blue-50', text: 'text-blue-700', btn: 'bg-blue-600 hover:bg-blue-700', bar: 'bg-blue-500', chip: 'bg-blue-100 text-blue-800', grad: 'from-blue-500 to-blue-700', dot: 'bg-blue-500', ring: 'ring-blue-200', border: 'border-blue-500' },
  misa: { soft: 'bg-emerald-50', text: 'text-emerald-700', btn: 'bg-emerald-600 hover:bg-emerald-700', bar: 'bg-emerald-500', chip: 'bg-emerald-100 text-emerald-800', grad: 'from-emerald-500 to-emerald-700', dot: 'bg-emerald-500', ring: 'ring-emerald-200', border: 'border-emerald-500' },
  gov: { soft: 'bg-rose-50', text: 'text-rose-700', btn: 'bg-rose-600 hover:bg-rose-700', bar: 'bg-rose-500', chip: 'bg-rose-100 text-rose-800', grad: 'from-rose-500 to-red-700', dot: 'bg-rose-500', ring: 'ring-rose-200', border: 'border-rose-500' },
};

function themeOf(s) { return themes[s.theme] || themes.ela; }

function countQ(s) { return s.topics.reduce((n, t) => n + t.questions.length, 0); }

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function sameSet(a = [], b = []) {
  if (a.length !== b.length) return false;
  const sb = new Set(b);
  return a.every((x) => sb.has(x));
}

function readProgress() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); }
  catch { return {}; }
}

function writeProgress(data) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch {}
}

function statsFor(slug) {
  const data = readProgress();
  const subject = subjects.find((s) => s.slug === slug);
  const total = countQ(subject);
  const entry = data[slug];
  if (!entry) return { total, answered: 0, correct: 0, pct: 0, accuracy: 0, sessions: [] };
  const answered = Object.keys(entry.answered || {}).length;
  const correct = Object.keys(entry.correct || {}).length;
  return {
    total,
    answered,
    correct,
    pct: total ? Math.round((answered / total) * 100) : 0,
    accuracy: answered ? Math.round((correct / answered) * 100) : 0,
    sessions: entry.sessions || [],
  };
}

function recordSession(slug, label, results) {
  const data = readProgress();
  const subject = data[slug] || { answered: {}, correct: {}, sessions: [] };
  const answered = { ...subject.answered };
  const correct = { ...subject.correct };
  let score = 0;
  results.forEach((r) => {
    answered[r.id] = true;
    if (r.isCorrect) { correct[r.id] = true; score++; }
    else if (r.selfGraded === false) delete correct[r.id];
  });
  const gradable = results.filter((r) => r.gradable);
  const sessions = [...(subject.sessions || []), {
    ts: Date.now(), label, score, total: gradable.length, count: results.length,
  }].slice(-25);
  data[slug] = { answered, correct, sessions };
  writeProgress(data);
}

function esc(str) {
  return String(str ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function nl(str) {
  return esc(str).replace(/\n/g, '<br>');
}

const state = {
  view: 'home', // home | subject | quiz | results
  slug: null,
  mode: null,
  questions: [],
  label: '',
  ebas: null,
  index: 0,
  answers: {},
  checked: {},
  selfGrade: {},
  ebasOpen: true,
};

const app = document.getElementById('app');

function goHome() {
  state.view = 'home';
  render();
}

function goSubject(slug) {
  state.view = 'subject';
  state.slug = slug;
  render();
}

function startQuiz(slug, mode) {
  const subject = subjects.find((s) => s.slug === slug);
  let questions, label, ebas = null;
  if (mode === 'full') {
    questions = shuffle(subject.topics.flatMap((t) =>
      t.questions.map((q) => ({ ...q, topicName: t.name, ...(t.ebas ? { ebas: t.ebas } : {}) }))
    ));
    label = subject.name + ' · Full practice test';
  } else {
    const topic = subject.topics.find((t) => t.id === mode);
    questions = shuffle(topic.questions);
    label = subject.name + ' · ' + topic.name;
    ebas = topic.ebas || null;
  }
  state.view = 'quiz';
  state.slug = slug;
  state.mode = mode;
  state.questions = questions;
  state.label = label;
  state.ebas = ebas;
  state.index = 0;
  state.answers = {};
  state.checked = {};
  state.selfGrade = {};
  state.ebasOpen = true;
  render();
}

function finishQuiz() {
  const results = state.questions.map((q) => {
    if (q.type === 'cr') {
      const graded = state.selfGrade[q.id];
      return { id: q.id, gradable: graded !== undefined, isCorrect: graded === true, selfGraded: graded };
    }
    const ok = q.type === 'single'
      ? state.answers[q.id] === q.answer
      : sameSet(state.answers[q.id] || [], q.answer || []);
    return { id: q.id, gradable: true, isCorrect: ok };
  });
  recordSession(state.slug, state.label, results);
  state.view = 'results';
  state._lastResults = results;
  render();
}

function render() {
  if (state.view === 'home') app.innerHTML = renderHome();
  else if (state.view === 'subject') app.innerHTML = renderSubject();
  else if (state.view === 'quiz') app.innerHTML = renderQuiz();
  else if (state.view === 'results') app.innerHTML = renderResults();
  bind();
}

        const th = themeOf(sub);
        const active = sub.slug === s.slug;
        return `<button data-action="subject" data-slug="${sub.slug}" class="flex items-center gap-2 rounded-lg px-3 py-2 text-sm font-semibold ${active ? th.soft + ' ' + th.text : 'text-slate-600 hover:bg-slate-100'}"><span class="h-2 w-2 rounded-full ${th.dot}"></span>${esc(sub.name)}</button>`;
      }).join('')}</nav>
    </div>
  </header>
  <main class="mx-auto max-w-6xl px-4 py-8">
    <button data-action="home" class="mb-4 text-sm font-semibold text-slate-500 hover:text-slate-900">&lt;- All tests</button>
    <section class="overflow-hidden rounded-3xl bg-gradient-to-br ${t.grad} p-6 text-white sm:p-8">
      <span class="inline-flex rounded-full bg-white/20 px-2.5 py-1 text-xs font-semibold">${esc(s.name)}</span>
      <h1 class="mt-3 text-3xl font-extrabold sm:text-4xl">${esc(s.fullName)}</h1>
      <p class="mt-2 text-white/90">${esc(s.tagline)}</p>
      <p class="mt-4 text-sm text-white/85"><strong>Format:</strong> ${esc(s.format.structure)}</p>
      <a href="${esc(s.officialUrl)}" target="_blank" rel="noreferrer" class="mt-4 inline-block text-sm font-semibold underline">Official practice &amp; resources -&gt;</a>
    </section>
    <div class="mt-6 grid gap-6 lg:grid-cols-3">
      <div class="lg:col-span-2 space-y-6">
        <div class="rounded-2xl bg-white p-6 shadow-sm ring-1 ring-slate-100 flex flex-wrap items-center justify-between gap-3">
          <div><h2 class="text-lg font-bold">Full practice test</h2><p class="text-sm text-slate-500">A shuffled mix of every topic — about 1 hour of focused practice.</p></div>
          <button data-action="quiz" data-slug="${s.slug}" data-mode="full" class="rounded-xl px-4 py-2.5 text-sm font-semibold text-white ${t.btn}">Start full test (${st.total} items)</button>
        </div>
        <div>
          <h2 class="mb-3 text-lg font-bold">Practice by topic</h2>
          <div class="space-y-3">${s.topics.map((tp) => `
            <div class="rounded-2xl bg-white p-5 shadow-sm ring-1 ${t.ring} flex flex-wrap items-center justify-between gap-4">
              <div><div class="flex items-center gap-2"><span class="h-2.5 w-2.5 rounded-full ${t.dot}"></span><h3 class="font-bold">${esc(tp.name)}</h3><span class="rounded-full px-2.5 py-1 text-xs font-semibold ${t.chip}">${tp.questions.length} Q</span></div>
              <p class="mt-1 text-sm text-slate-500">${esc(tp.blurb)}</p></div>
              <button data-action="quiz" data-slug="${s.slug}" data-mode="${tp.id}" class="rounded-xl bg-white px-4 py-2.5 text-sm font-semibold text-slate-700 ring-1 ring-slate-200 hover:bg-slate-50">Practice -&gt;</button>
            </div>`).join('')}
          </div>
        </div>
        <div class="rounded-2xl bg-white p-6 shadow-sm ring-1 ring-slate-100">
          <h2 class="text-lg font-bold">Test-day strategy</h2>
          <ul class="mt-3 space-y-2">${s.studyTips.map((tip, i) => `<li class="flex gap-3 text-sm text-slate-600"><span class="grid h-5 w-5 place-items-center rounded-full ${t.chip} text-[11px] font-bold">${i+1}</span>${esc(tip)}</li>`).join('')}</ul>
        </div>
      </div>
      <aside class="space-y-6">
        <div class="rounded-2xl bg-white p-6 shadow-sm ring-1 ring-slate-100">
          <div class="flex justify-between"><h2 class="text-lg font-bold">Your progress</h2>${st.answered ? `<button data-action="reset" data-slug="${s.slug}" class="text-xs font-semibold text-slate-400 hover:text-rose-600">Reset</button>` : ''}</div>
          <div class="mt-4 mb-2 flex justify-between text-xs font-semibold text-slate-500"><span>Coverage</span><span>${st.pct}%</span></div>
          <div class="h-2 rounded-full bg-slate-100"><div class="h-2 rounded-full ${t.bar}" style="width:${st.pct}%"></div></div>
          <div class="mt-4 grid grid-cols-2 gap-3">
            <div class="rounded-xl bg-slate-50 px-4 py-3"><div class="text-2xl font-extrabold">${st.answered}/${st.total}</div><div class="text-xs font-semibold uppercase text-slate-500">Attempted</div></div>
            <div class="rounded-xl bg-slate-50 px-4 py-3"><div class="text-2xl font-extrabold">${st.accuracy}%</div><div class="text-xs font-semibold uppercase text-slate-500">Accuracy</div></div>
          </div>
        </div>
        <div class="rounded-2xl bg-white p-6 shadow-sm ring-1 ring-slate-100">
          <h2 class="text-lg font-bold">Reporting categories</h2>
          <ul class="mt-3 space-y-3">${s.domains.map((d) => `<li class="text-sm"><div class="font-semibold">${esc(d.name)}</div><div class="text-slate-500">${esc(d.weight)}</div></li>`).join('')}</ul>
        </div>
        <div class="rounded-2xl bg-white p-6 shadow-sm ring-1 ring-slate-100">
          <h2 class="text-lg font-bold">Recent sessions</h2>
          ${recent.length === 0 ? '<p class="mt-2 text-sm text-slate-500">No sessions yet.</p>' : `<ul class="mt-3 space-y-2">${recent.map((sesh) => `<li class="flex justify-between rounded-lg bg-slate-50 px-3 py-2 text-sm"><span class="truncate pr-2 font-medium">${esc(sesh.label)}</span><span class="font-bold">${sesh.total ? sesh.score + '/' + sesh.total : '-'}</span></li>`).join('')}</ul>`}
        </div>
      </aside>
    </div>
  </main>`;
}

function renderQuiz() {
  const s = subjects.find((x) => x.slug === state.slug);
  const t = themeOf(s);
  const q = state.questions[state.index];
  const isChecked = !!state.checked[q.id];
  const answer = state.answers[q.id];
  const isLast = state.index === state.questions.length - 1;
  const ebas = q.ebas || state.ebas;
  const progressPct = ((state.index + (isChecked ? 1 : 0)) / state.questions.length) * 100;

  let body = '';
  if (q.type === 'single' || q.type === 'multi') {
    if (q.type === 'multi') body += '<p class="mb-1 text-xs font-semibold uppercase tracking-wide text-slate-500">Select all that apply</p>';
    body += `<div class="mt-5 space-y-2.5">${q.choices.map((c) => {
      const selected = q.type === 'multi' ? (Array.isArray(answer) && answer.includes(c.id)) : answer === c.id;
      const isCorrectChoice = q.type === 'multi' ? (q.answer || []).includes(c.id) : q.answer === c.id;
      let cls = 'border-slate-200 bg-white hover:border-slate-300';
      if (isChecked) {
        if (isCorrectChoice) cls = 'border-emerald-500 bg-emerald-50';
        else if (selected) cls = 'border-rose-500 bg-rose-50';
        else cls = 'border-slate-200 bg-white opacity-70';
      } else if (selected) cls = t.border + ' ' + t.soft;
      return `<button data-action="choose" data-cid="${c.id}" ${isChecked ? 'disabled' : ''} class="flex w-full items-start gap-3 rounded-xl border-2 p-3.5 text-left ${cls}">
        <span class="mt-0.5 grid h-5 w-5 shrink-0 place-items-center border-2 text-[11px] font-bold ${q.type === 'multi' ? 'rounded-md' : 'rounded-full'} ${selected || (isChecked && isCorrectChoice) ? 'border-current' : 'border-slate-300 text-transparent'}">${c.id.toUpperCase()}</span>
        <span class="text-sm leading-relaxed">${esc(c.text)}</span>
      </button>`;
    }).join('')}</div>`;
  } else {
    body = `<div class="mt-5"><textarea data-action="text" ${isChecked ? 'disabled' : ''} rows="7" class="w-full resize-y rounded-xl border border-slate-200 p-4 text-sm leading-relaxed focus:outline-none focus:ring-2 focus:ring-slate-200 disabled:bg-slate-50" placeholder="Type your response here (optional — you can reveal the model and move on anytime)...">${esc(answer || '')}</textarea>
      ${q.points ? `<p class="mt-1 text-xs text-slate-500">Worth up to ${q.points} points on the rubric below. Writing is optional — use Reveal or Skip to continue the exam.</p>` : '<p class="mt-1 text-xs text-slate-500">Writing is optional — use Reveal or Skip to continue the exam.</p>'}</div>`;
  }

  let feedback = '';
  if (isChecked && q.type !== 'cr') {
    const ok = q.type === 'single' ? answer === q.answer : sameSet(answer || [], q.answer || []);
    feedback = `<div class="mt-5 rounded-xl border-l-4 p-4 ${ok ? 'border-emerald-500 bg-emerald-50' : 'border-rose-500 bg-rose-50'}"><p class="font-bold">${ok ? 'Correct' : 'Not quite'}</p><p class="mt-1 text-sm text-slate-600">${esc(q.explanation)}</p></div>`;
  }
  if (isChecked && q.type === 'cr') {
    const grade = state.selfGrade[q.id];
    const model = (q.sampleResponse && String(q.sampleResponse).trim())
      ? nl(q.sampleResponse)
      : 'No model response is stored for this item. Use the rubric below, then continue.';
    const rubricHtml = Array.isArray(q.rubric) && q.rubric.length
      ? `<div class="rounded-xl bg-white p-4 ring-1 ring-slate-200"><p class="text-xs font-bold uppercase text-slate-500">Scoring rubric — did your response...</p><ul class="mt-2 space-y-1.5">${q.rubric.map((r) => `<li class="flex gap-2 text-sm text-slate-600"><span class="mt-1 h-1.5 w-1.5 rounded-full bg-slate-400 shrink-0"></span>${esc(r)}</li>`).join('')}</ul></div>`
      : '<div class="rounded-xl bg-white p-4 ring-1 ring-slate-200"><p class="text-sm text-slate-600">Use a clear claim, text evidence, and organized reasoning.</p></div>';
    feedback = `<div class="mt-5 space-y-4">
      <div class="rounded-xl border-l-4 border-slate-400 bg-slate-50 p-4"><p class="text-xs font-bold uppercase text-slate-500">Model response</p><p class="mt-2 text-sm leading-relaxed text-slate-600">${model}</p></div>
      ${rubricHtml}
      <div class="rounded-xl bg-slate-50 p-4"><p class="text-sm font-semibold">Optional self-check (you can continue either way)</p>
        <div class="mt-3 flex flex-wrap gap-2">
          <button data-action="grade" data-val="true" class="rounded-xl px-4 py-2 text-sm font-semibold ${grade === true ? 'bg-emerald-600 text-white' : 'bg-white text-slate-600 ring-1 ring-slate-200'}">I met the rubric</button>
          <button data-action="grade" data-val="false" class="rounded-xl px-4 py-2 text-sm font-semibold ${grade === false ? 'bg-rose-600 text-white' : 'bg-white text-slate-600 ring-1 ring-slate-200'}">Needs more work</button>
        </div>
      </div>
    </div>`;
  }

  const canCheck = q.type === 'cr'
    ? true
    : q.type === 'multi'
      ? Array.isArray(answer) && answer.length > 0
      : !!answer;

  let ebasHtml = '';
  if (ebas) {
    ebasHtml = `<div class="mt-4 rounded-2xl bg-white p-5 shadow-sm ring-1 ${t.ring}">
      <button data-action="toggle-ebas" class="flex w-full items-center justify-between text-left"><span class="font-bold ${t.text}">Source Set - click to ${state.ebasOpen ? 'hide' : 'show'}</span><span class="text-slate-400">${state.ebasOpen ? '^' : 'v'}</span></button>
      ${state.ebasOpen ? `<div class="mt-3 space-y-3"><p class="font-semibold">${esc(ebas.compellingQuestion)}</p><p class="text-sm text-slate-500">${esc(ebas.background)}</p>${ebas.sources.map((src) => `<div class="rounded-xl bg-slate-50 p-4"><div class="flex justify-between gap-3"><span class="font-bold">${esc(src.label)}</span><span class="text-xs italic text-slate-500">${esc(src.citation)}</span></div><p class="mt-1.5 text-sm text-slate-600">${esc(src.text)}</p></div>`).join('')}</div>` : ''}
    </div>`;
  }

  return `
  <main class="mx-auto max-w-3xl px-4 py-8">
    <div class="mb-4 flex justify-between"><button data-action="subject" data-slug="${s.slug}" class="text-sm font-semibold text-slate-500 hover:text-slate-900">&lt;- Exit</button><span class="text-sm font-semibold text-slate-500">Question ${state.index + 1} of ${state.questions.length}</span></div>
    <div class="h-2 rounded-full bg-slate-100"><div class="h-2 rounded-full ${t.bar} transition-all" style="width:${progressPct}%"></div></div>
    <div class="mt-3 flex flex-wrap gap-2">
      <span class="rounded-full px-2.5 py-1 text-xs font-semibold ${t.chip}">${esc(state.label)}</span>
      ${q.topicName && state.mode === 'full' ? `<span class="rounded-full bg-slate-100 px-2.5 py-1 text-xs font-semibold text-slate-600">${esc(q.topicName)}</span>` : ''}
      <span class="rounded-full bg-slate-100 px-2.5 py-1 text-xs font-semibold text-slate-600">${q.type === 'single' ? 'Multiple choice' : q.type === 'multi' ? 'Multiple select' : 'Constructed response' + (q.points ? ' · ' + q.points + ' pt' : '')}</span>
    </div>
    ${ebasHtml}
    <div class="mt-4 rounded-2xl bg-white p-6 shadow-sm ring-1 ring-slate-100">
      ${q.passage ? `<div class="mb-5 whitespace-pre-line rounded-xl border-l-4 border-slate-300 bg-slate-50 p-4 text-[15px] leading-relaxed text-slate-600">${nl(q.passage)}</div>` : ''}
      <h2 class="text-lg font-semibold leading-snug">${esc(q.prompt)}</h2>
      ${body}
      ${feedback}
      <div class="mt-6 flex flex-wrap items-center justify-between gap-3">
        <button data-action="prev" ${state.index === 0 ? 'disabled' : ''} class="rounded-xl bg-white px-4 py-2.5 text-sm font-semibold text-slate-700 ring-1 ring-slate-200 disabled:opacity-40">&lt;- Previous</button>
        <div class="flex flex-wrap gap-2">
          ${!isChecked
            ? (q.type === 'cr'
              ? `<button data-action="check" class="rounded-xl px-4 py-2.5 text-sm font-semibold text-white ${t.btn}">Reveal model &amp; rubric</button>
                 <button data-action="skip-cr" class="rounded-xl bg-white px-4 py-2.5 text-sm font-semibold text-slate-700 ring-1 ring-slate-200">Skip essay -&gt;</button>`
              : `<button data-action="check" ${canCheck ? '' : 'disabled'} class="rounded-xl px-4 py-2.5 text-sm font-semibold text-white ${t.btn} disabled:opacity-40">Check answer</button>`)
            : `<button data-action="next" class="rounded-xl px-4 py-2.5 text-sm font-semibold text-white ${t.btn}">${isLast ? 'Finish and see score' : 'Next question -&gt;'}</button>`}
        </div>
      </div>
    </div>
  </main>`;
}

function renderResults() {
  const s = subjects.find((x) => x.slug === state.slug);
  const t = themeOf(s);
  const results = state._lastResults || [];
  const gradable = results.filter((r) => r.gradable);
  const correct = gradable.filter((r) => r.isCorrect).length;
  const pct = gradable.length ? Math.round((correct / gradable.length) * 100) : 0;
  const msg = pct >= 80 ? 'Excellent - you have a strong command of this material.'
    : pct >= 60 ? 'Good work. Review the items you missed and try again.'
    : 'Keep going - repetition here is exactly how you build the score you want.';
  return `
  <main class="mx-auto max-w-2xl px-4 py-8">
    <div class="overflow-hidden rounded-2xl bg-white shadow-sm ring-1 ring-slate-100">
      <div class="bg-gradient-to-br ${t.grad} p-8 text-center text-white">
        <p class="text-sm font-semibold uppercase tracking-wide text-white/80">${esc(state.label)}</p>
        <div class="mt-3 text-6xl font-extrabold">${pct}%</div>
        <p class="mt-2 text-white/90">${correct} of ${gradable.length} scored items correct</p>
      </div>
      <div class="p-6 text-center">
        <p class="text-sm text-slate-500">${msg}</p>
        <div class="mt-6 flex flex-wrap justify-center gap-3">
          <button data-action="quiz" data-slug="${s.slug}" data-mode="${state.mode}" class="rounded-xl px-4 py-2.5 text-sm font-semibold text-white ${t.btn}">Try this set again</button>
          <button data-action="subject" data-slug="${s.slug}" class="rounded-xl bg-white px-4 py-2.5 text-sm font-semibold text-slate-700 ring-1 ring-slate-200">Back to ${esc(s.name)}</button>
          <button data-action="home" class="rounded-xl bg-white px-4 py-2.5 text-sm font-semibold text-slate-700 ring-1 ring-slate-200">All tests</button>
        </div>
      </div>
    </div>
  </main>`;
}

function bind() {
  app.querySelectorAll('[data-action]').forEach((el) => {
    const action = el.getAttribute('data-action');
    if (action === 'text') {
      el.addEventListener('input', (e) => {
        const q = state.questions[state.index];
        state.answers[q.id] = e.target.value;
      });
      return;
    }
    el.addEventListener('click', () => {
      if (action === 'home') goHome();
      else if (action === 'subject') goSubject(el.getAttribute('data-slug'));
      else if (action === 'quiz') startQuiz(el.getAttribute('data-slug'), el.getAttribute('data-mode'));
      else if (action === 'reset') {
        if (confirm('Reset progress for this subject?')) {
          const data = readProgress();
          delete data[el.getAttribute('data-slug')];
          writeProgress(data);
          render();
        }
      } else if (action === 'choose') {
        const q = state.questions[state.index];
        if (state.checked[q.id]) return;
        const cid = el.getAttribute('data-cid');
        if (q.type === 'multi') {
          const cur = Array.isArray(state.answers[q.id]) ? state.answers[q.id] : [];
          state.answers[q.id] = cur.includes(cid) ? cur.filter((c) => c !== cid) : [...cur, cid];
        } else {
          state.answers[q.id] = cid;
        }
        render();
      } else if (action === 'check' || action === 'skip-cr') {
        const q = state.questions[state.index];
        state.checked[q.id] = true;
        if (action === 'skip-cr' && state.selfGrade[q.id] === undefined) {
          state.selfGrade[q.id] = false;
        }
        render();
      } else if (action === 'next') {
        if (state.index === state.questions.length - 1) finishQuiz();
        else { state.index++; render(); }
      } else if (action === 'prev') {
        if (state.index > 0) { state.index--; render(); }
      } else if (action === 'grade') {
        const q = state.questions[state.index];
        state.selfGrade[q.id] = el.getAttribute('data-val') === 'true';
        render();
      } else if (action === 'toggle-ebas') {
        state.ebasOpen = !state.ebasOpen;
        render();
      }
    });
  });
}

render();
  </script>
</body>
</html>
