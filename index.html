 label: 'Source C',
 citation: 'Editorial in a national newspaper opposing the change.',
 text:
 '"Eighteen is the age at which society recognizes full adult responsibility - for contracts, military service, and the vote. Extending the franchise to 16-year-olds, most of whom are still full-time dependents in high school, risks decisions unduly shaped by parents or teachers rather than independent judgment."',
 },
 ],
 },
 questions: [
 {
 id: 'gov-eb-1',
 type: 'single',
 passage:
 'Refer to the EBAS sources above (Sources A-C).',
 prompt:
 'Which source is most likely to reflect a one-sided point of view, and why?',
 choices: [
 { id: 'a', text: 'Source A, because it is published by an advocacy organization promoting a specific position.' },
 { id: 'b', text: 'Source B, because it is testimony from a scientist.' },
 { id: 'c', text: 'Source C, because it appears in a newspaper.' },
 { id: 'd', text: 'None of the sources show any point of view.' },
 ],
 answer: 'a',
 explanation:
 'Evaluating credibility means considering author and purpose. Source A comes from a youth-civics advocacy group whose goal is to promote lowering the voting age, making it the most likely to be one-sided. (Source C also has a viewpoint, but the question asks for the strongest example, and an advocacy group exists specifically to advance its cause.)',
 },
 {
 id: 'gov-eb-2',
 type: 'single',
 passage: 'Refer to Source B.',
 prompt:
 'Which detail from Source B could be used to support BOTH sides of the debate?',
 choices: [
 { id: 'a', text: 'The claim that "cold cognition... is well developed by about age 16."' },
 { id: 'b', text: 'The note that experience and independence "continue to develop into the late teens."' },
 { id: 'c', text: 'Source B contains balanced evidence relevant to both supporters and critics.' },
 { id: 'd', text: 'Source B only supports lowering the voting age.' },
 ],
 answer: 'c',
 explanation:
 'Source B offers evidence for both sides: deliberate reasoning is developed by 16 (supports lowering), but independence keeps developing later (supports keeping 18). Recognizing that a single credible source can inform both positions is a key EBAS skill.',
 },
 {
 id: 'gov-eb-3',
 type: 'multi',
 passage: 'Refer to Sources A-C.',
 prompt:
 'Select the TWO pieces of evidence that best support the claim that the voting age SHOULD be lowered to 16.',
 choices: [
 { id: 'a', text: 'Voting is "habit-forming," and earlier voters are "more likely to keep voting for life." (Source A)' },
 { id: 'b', text: '"Cold cognition... is well developed by about age 16." (Source B)' },
 { id: 'c', text: 'Sixteen-year-olds are "still full-time dependents in high school." (Source C)' },
 { id: 'd', text: 'Eighteen is "the age at which society recognizes full adult responsibility." (Source C)' },
 ],
 answer: ['a', 'b'],
 explanation:
 'A (lifelong voting habits) and B (deliberate reasoning developed by 16) both support lowering the age. C and D are from the opposing editorial and support keeping the age at 18.',
 },
 {
 id: 'gov-eb-4',
 type: 'cr',
 points: 5,
 passage:
 'This is the culminating EBAS task. Use Sources A, B, and C.',
 prompt:
 'Should the national voting age be lowered to 16? Develop and support a claim in response to the compelling question. Use evidence from at least TWO of the three sources, and briefly address the strongest point from the opposing side.',
 sampleResponse:
 'The national voting age should not be lowered to 16, though the strongest arguments for lowering it deserve a fair hearing. Supporters make a real point: Source A notes that voting is "habit-forming" and that earlier voters are "more likely to keep voting for life," and Source B confirms that the calm, deliberate reasoning used in a voting booth - "cold cognition" - is "well developed by about age 16." If the only question were whether 16-year-olds can reason carefully, the case for lowering the age would be strong. However, Source B also observes that "life experience and independence from parental influence continue to develop into the late teens," and Source C argues that most 16-year-olds are "still full-time dependents in high school," so their votes risk being "unduly shaped by parents or teachers." Because independent judgment - not just reasoning ability - is central to casting a free vote, the evidence about continued development of independence is more decisive for a national election. Therefore, while civic education for teens should be expanded, the voting age should remain at 18.',
 rubric: [
 'States a clear claim that directly answers the compelling question.',
 'Uses specific, accurately cited evidence from at least TWO sources.',
 'Evaluates or acknowledges the opposing side's strongest point.',
 'Reasoning connects evidence to the claim (not just listing quotes).',

 ],

 ],
 },
 ],

var EXTRA_ELA_TOPIC = {
  id: 'ela-extra-practice',
  name: 'Extra Mixed Practice (Hour Pack)',
  blurb: 'Additional Grade 10 reading, vocabulary, and evidence questions for extended practice.',
  questions: [
    { id: 'ela-x-1', type: 'single', passage: 'The author describes the city at dawn as "a gray hush broken only by the distant rattle of the first train."', prompt: 'What does the phrase "gray hush" most strongly suggest?', choices: [{ id: 'a', text: 'The city is loud and crowded.' }, { id: 'b', text: 'The morning is quiet and muted in color and sound.' }, { id: 'c', text: 'It is raining heavily.' }, { id: 'd', text: 'The train has already arrived.' }], answer: 'b', explanation: '"Gray hush" combines muted color with quiet sound, suggesting a calm, subdued dawn.' },
    { id: 'ela-x-2', type: 'single', passage: 'In the article, the scientist admits her first hypothesis was wrong and explains how the unexpected data led to a better model.', prompt: 'The scientist\'s admission primarily serves to', choices: [{ id: 'a', text: 'prove that science never works.' }, { id: 'b', text: 'show that revising ideas based on evidence is part of scientific thinking.' }, { id: 'c', text: 'entertain readers with a funny story.' }, { id: 'd', text: 'argue that hypotheses should never change.' }], answer: 'b', explanation: 'Admitting error and revising the model models evidence-based scientific reasoning.' },
    { id: 'ela-x-3', type: 'multi', passage: 'Poem excerpt: "She kept the letter unopened for a week, turning it over like a stone she was not ready to throw."', prompt: 'Select the TWO statements that are best supported by the excerpt.', choices: [{ id: 'a', text: 'The character is delaying facing important news.' }, { id: 'b', text: 'The letter is compared to something heavy and decisive.' }, { id: 'c', text: 'The character has already read the letter.' }, { id: 'd', text: 'The letter is unimportant to her.' }], answer: ['a', 'b'], explanation: 'Unopened for a week shows delay; "like a stone" is a simile implying weight and consequence.' },
    { id: 'ela-x-4', type: 'single', passage: 'The word "mitigate" appears in: "New bus routes were designed to mitigate traffic near the school."', prompt: 'As used here, "mitigate" most nearly means', choices: [{ id: 'a', text: 'increase.' }, { id: 'b', text: 'ignore.' }, { id: 'c', text: 'reduce or lessen.' }, { id: 'd', text: 'celebrate.' }], answer: 'c', explanation: 'Context of solving traffic problems shows mitigate means lessen.' },
    { id: 'ela-x-5', type: 'single', passage: 'Two paragraphs argue for later school start times. Paragraph 1 cites sleep research. Paragraph 2 describes student survey results.', prompt: 'How do the two paragraphs work together?', choices: [{ id: 'a', text: 'They present scientific and student-based support for the same claim.' }, { id: 'b', text: 'They contradict each other completely.' }, { id: 'c', text: 'They only discuss sports schedules.' }, { id: 'd', text: 'They prove schools should start earlier.' }], answer: 'a', explanation: 'Research and survey data both support later start times from different angles.' },
    { id: 'ela-x-6', type: 'single', passage: '"The coach\'s praise was sparse, so when it came, the team treasured it."', prompt: 'The word "sparse" most nearly means', choices: [{ id: 'a', text: 'frequent and loud.' }, { id: 'b', text: 'rare or limited.' }, { id: 'c', text: 'confusing.' }, { id: 'd', text: 'unfair.' }], answer: 'b', explanation: 'Because praise was limited, the team valued it when it appeared.' },
    { id: 'ela-x-7', type: 'multi', passage: 'Informational text: Community gardens can lower grocery costs, teach skills, and build neighborhood connections, but they require land, volunteers, and ongoing maintenance.', prompt: 'Select the TWO details that identify challenges of community gardens.', choices: [{ id: 'a', text: 'They require land.' }, { id: 'b', text: 'They need volunteers and maintenance.' }, { id: 'c', text: 'They lower grocery costs.' }, { id: 'd', text: 'They teach skills.' }], answer: ['a', 'b'], explanation: 'Land, volunteers, and maintenance are costs/challenges; the others are benefits.' },
    { id: 'ela-x-8', type: 'single', passage: 'The narrator says the abandoned factory "still hummed with the ghosts of payday whistles."', prompt: 'This figurative language most strongly suggests that', choices: [{ id: 'a', text: 'the factory is currently operating.' }, { id: 'b', text: 'memories of its working past still feel present.' }, { id: 'c', text: 'ghosts literally live there.' }, { id: 'd', text: 'the factory has no history.' }], answer: 'b', explanation: 'The "ghosts" of whistles evoke lingering memory of past labor, not literal ghosts.' },
    { id: 'ela-x-9', type: 'single', passage: 'In a debate speech, a student first defines "renewable energy," then gives three local examples, then answers an opposing claim.', prompt: 'Which organizational pattern best describes the speech?', choices: [{ id: 'a', text: 'Definition, examples, then rebuttal.' }, { id: 'b', text: 'Chronological order only.' }, { id: 'c', text: 'Cause and effect with no claim.' }, { id: 'd', text: 'A random list of jokes.' }], answer: 'a', explanation: 'The sequence matches definition, examples, then answering opposition.' },
    { id: 'ela-x-10', type: 'single', passage: '"Her argument was tenuous: it rested on one outdated study and ignored newer data."', prompt: '"Tenuous" most nearly means', choices: [{ id: 'a', text: 'strong and well supported.' }, { id: 'b', text: 'weak or poorly supported.' }, { id: 'c', text: 'humorous.' }, { id: 'd', text: 'official.' }], answer: 'b', explanation: 'Relying on one outdated study and ignoring new data makes the argument weak.' },
    { id: 'ela-x-11', type: 'multi', passage: 'Literary excerpt: Jonas smiled in public but kept a private journal of doubts. At home he wrote, "If I speak, I lose the role; if I stay silent, I lose myself."', prompt: 'Select the TWO ideas the excerpt develops about Jonas.', choices: [{ id: 'a', text: 'He presents a different face in public than in private.' }, { id: 'b', text: 'He feels torn between appearance and honesty.' }, { id: 'c', text: 'He has no inner conflict.' }, { id: 'd', text: 'He never writes.' }], answer: ['a', 'b'], explanation: 'Public smile vs private journal and the quoted dilemma show conflict between role and self.' },
    { id: 'ela-x-12', type: 'single', passage: 'Article title: "Plastic: Convenient Today, Costly Tomorrow." The article explains how single-use plastics save time but create long-term pollution.', prompt: 'The title most clearly foreshadows', choices: [{ id: 'a', text: 'a comparison of short-term benefits and long-term costs.' }, { id: 'b', text: 'a recipe for plastic toys.' }, { id: 'c', text: 'a biography of a scientist.' }, { id: 'd', text: 'a sports report.' }], answer: 'a', explanation: '"Convenient today" vs "costly tomorrow" signals a trade-off structure.' },
    { id: 'ela-x-13', type: 'single', passage: 'The critic calls the film "ambitious but uneven," praising the acting while noting the plot stalls in the middle.', prompt: 'The critic\'s overall evaluation is best described as', choices: [{ id: 'a', text: 'entirely negative.' }, { id: 'b', text: 'mixed, with both strengths and weaknesses.' }, { id: 'c', text: 'purely enthusiastic.' }, { id: 'd', text: 'unrelated to the film.' }], answer: 'b', explanation: 'Praise for acting plus criticism of plot = mixed review.' },
    { id: 'ela-x-14', type: 'single', passage: '"To abate the flooding, engineers widened the drainage canals."', prompt: '"Abate" most nearly means', choices: [{ id: 'a', text: 'worsen.' }, { id: 'b', text: 'reduce.' }, { id: 'c', text: 'photograph.' }, { id: 'd', text: 'celebrate.' }], answer: 'b', explanation: 'Widening canals to address flooding aims to reduce it.' },
    { id: 'ela-x-15', type: 'multi', passage: 'Paired texts: Text 1 argues phones in class increase distraction. Text 2 argues phones can support research when rules are clear.', prompt: 'Select the TWO statements that accurately describe the paired texts.', choices: [{ id: 'a', text: 'They present different positions on classroom phone use.' }, { id: 'b', text: 'Text 2 allows that phones can help under certain conditions.' }, { id: 'c', text: 'Both texts ban all technology forever.' }, { id: 'd', text: 'Neither text mentions phones.' }], answer: ['a', 'b'], explanation: 'The texts disagree, and Text 2 is conditional support.' },
    { id: 'ela-x-16', type: 'single', passage: 'A character repeatedly checks the clock during dinner, answers in one-word replies, and glances at the door.', prompt: 'These details mainly suggest that the character is', choices: [{ id: 'a', text: 'eager to leave or preoccupied.' }, { id: 'b', text: 'fully relaxed and present.' }, { id: 'c', text: 'unable to tell time.' }, { id: 'd', text: 'hosting a party.' }], answer: 'a', explanation: 'Clock-checking, short replies, and door glances imply impatience or distraction.' },
    { id: 'ela-x-17', type: 'single', passage: 'The essay claims community service should be required for graduation, then offers statistics, a student anecdote, and a response to the claim that teens are already too busy.', prompt: 'Which rhetorical move appears last in this structure?', choices: [{ id: 'a', text: 'Addressing a counterargument.' }, { id: 'b', text: 'Stating the claim for the first time.' }, { id: 'c', text: 'Defining community service.' }, { id: 'd', text: 'Ending without any claim.' }], answer: 'a', explanation: 'Responding to "teens are too busy" is a counterargument move.' },
    { id: 'ela-x-18', type: 'single', passage: '"The mayor\'s plan was pragmatic: it aimed for progress that the budget could actually pay for."', prompt: '"Pragmatic" most nearly means', choices: [{ id: 'a', text: 'dreamy and unrealistic.' }, { id: 'b', text: 'practical and realistic.' }, { id: 'c', text: 'angry.' }, { id: 'd', text: 'secret.' }], answer: 'b', explanation: 'Tied to what the budget can pay for = practical.' },
    { id: 'ela-x-19', type: 'cr', points: 3, passage: 'Passage: A town is deciding whether to convert an empty lot into a skate park or a community garden. Supporters of the skate park say teens need a safe place to gather. Supporters of the garden say the neighborhood needs fresh food and quieter green space. Both groups agree the lot should not stay empty.', prompt: 'In a paragraph, make a claim about which option the town should choose. Use at least two details from the passage and acknowledge one point from the other side.', sampleResponse: 'The town should convert the lot into a community garden. The passage notes the neighborhood "needs fresh food and quieter green space," which serves residents of many ages every week, not only teens. Leaving the lot empty helps no one, so action is needed. Skate-park supporters fairly argue that teens need a "safe place to gather," and that need is real; however, a garden can still include seating and youth volunteer programs while providing food and calm space for the whole community.', rubric: ['States a clear claim.', 'Uses at least two passage details.', 'Acknowledges the other side.'] },
    { id: 'ela-x-20', type: 'single', passage: 'In a memoir, the author shifts from describing childhood summers at the shore to reflecting, years later, on why those summers still matter.', prompt: 'This shift in time most likely helps the author', choices: [{ id: 'a', text: 'connect past experience to present meaning.' }, { id: 'b', text: 'prove the shore never existed.' }, { id: 'c', text: 'avoid reflection entirely.' }, { id: 'd', text: 'write only about the weather.' }], answer: 'a', explanation: 'Moving from past scenes to later reflection links memory to meaning.' },
    { id: 'ela-x-21', type: 'multi', passage: 'Vocabulary in context: "The treaty was provisional - it would last only until a permanent agreement could be reached."', prompt: 'Select the TWO words closest in meaning to "provisional" as used here.', choices: [{ id: 'a', text: 'temporary' }, { id: 'b', text: 'interim' }, { id: 'c', text: 'permanent' }, { id: 'd', text: 'eternal' }], answer: ['a', 'b'], explanation: 'It lasts only until a permanent deal, so temporary/interim.' },
    { id: 'ela-x-22', type: 'single', passage: 'A news feature opens with a vivid scene of a flooded street, then provides statistics about rising storm frequency, then interviews a city planner.', prompt: 'The opening scene mainly functions to', choices: [{ id: 'a', text: 'engage readers and make the issue concrete before data and expert comment.' }, { id: 'b', text: 'replace the need for any facts.' }, { id: 'c', text: 'mock the city planner.' }, { id: 'd', text: 'end the article.' }], answer: 'a', explanation: 'Anecdotal opening hooks readers before broader evidence.' },
    { id: 'ela-x-23', type: 'single', passage: '"He spoke with candor, admitting the mistakes instead of hiding them."', prompt: '"Candor" most nearly means', choices: [{ id: 'a', text: 'honesty.' }, { id: 'b', text: 'secrecy.' }, { id: 'c', text: 'anger.' }, { id: 'd', text: 'confusion.' }], answer: 'a', explanation: 'Admitting mistakes instead of hiding them = honesty.' },
    { id: 'ela-x-24', type: 'single', passage: 'Drama excerpt: Character A: "You promised." Character B looks away. Character A: "Say something." Silence.', prompt: 'The stage silence most strongly emphasizes', choices: [{ id: 'a', text: 'Character B\'s reluctance or guilt.' }, { id: 'b', text: 'that the play has ended forever.' }, { id: 'c', text: 'that Character A is not present.' }, { id: 'd', text: 'a comedy routine.' }], answer: 'a', explanation: 'Looking away plus silence after "You promised" suggests avoidance/guilt.' },
    { id: 'ela-x-25', type: 'multi', passage: 'Informational chart note: Recycling rates rose from 20% to 35% over five years, while landfill fees also rose.', prompt: 'Select the TWO conclusions that can reasonably be drawn.', choices: [{ id: 'a', text: 'Recycling increased over the period.' }, { id: 'b', text: 'Landfill fees were higher by the end of the period.' }, { id: 'c', text: 'Nobody recycled in year five.' }, { id: 'd', text: 'Fees caused recycling with certainty and no other factors.' }], answer: ['a', 'b'], explanation: 'The numbers support rise in recycling and fees; causation is not proven.' },
    { id: 'ela-x-26', type: 'single', passage: 'The essay\'s thesis: "Social media can amplify both kindness and cruelty, so schools should teach digital citizenship rather than ban platforms outright."', prompt: 'Which statement best restates the thesis?', choices: [{ id: 'a', text: 'Teach responsible use instead of total bans, because platforms have mixed effects.' }, { id: 'b', text: 'Ban all social media immediately.' }, { id: 'c', text: 'Social media has only positive effects.' }, { id: 'd', text: 'Schools should ignore technology.' }], answer: 'a', explanation: 'The thesis balances harm/benefit and prefers education over bans.' },
    { id: 'ela-x-27', type: 'single', passage: '"The evidence was compelling enough to change several undecided voters\' minds."', prompt: '"Compelling" most nearly means', choices: [{ id: 'a', text: 'convincing.' }, { id: 'b', text: 'boring.' }, { id: 'c', text: 'illegal.' }, { id: 'd', text: 'invisible.' }], answer: 'a', explanation: 'Changing minds indicates the evidence was convincing.' },
    { id: 'ela-x-28', type: 'cr', points: 3, passage: 'From a student editorial: "Our school library should stay open after sports practices. Athletes who finish at 5:30 have no quiet place to study before the late bus at 6:15. The cafeteria is loud, and the hallway has no tables. Extending library hours by forty-five minutes would cost little in staff time but would help students who already stay late for school activities."', prompt: 'Write a paragraph evaluating the editorial\'s argument. Identify the claim, one strong piece of evidence, and one way the argument could be stronger.', sampleResponse: 'The editorial claims the library should stay open after sports practices so late-staying athletes have a quiet place to study. A strong detail is that practices end at 5:30 while the late bus comes at 6:15, leaving a real gap with no quiet space. The argument could be stronger if it included a cost estimate or staff schedule, not only the claim that the change would "cost little."', rubric: ['Identifies the claim.', 'Cites specific evidence.', 'Suggests a clear improvement.'] },
    { id: 'ela-x-29', type: 'single', passage: 'Poem lines: "We planted hope in shallow pots / then wondered why the roots gave out."', prompt: 'The metaphor most strongly suggests that', choices: [{ id: 'a', text: 'the speakers\' expectations were not given enough support to last.' }, { id: 'b', text: 'plants never need deep soil.' }, { id: 'c', text: 'hope always succeeds.' }, { id: 'd', text: 'the speakers are professional gardeners only.' }], answer: 'a', explanation: 'Shallow pots causing failed roots metaphorically means insufficient foundation for hope.' },
    { id: 'ela-x-30', type: 'single', passage: 'A researcher writes: "Although correlation does not prove causation, the pattern is consistent enough to warrant further study."', prompt: 'The researcher\'s tone is best described as', choices: [{ id: 'a', text: 'cautious but interested in more investigation.' }, { id: 'b', text: 'absolutely certain of a cause.' }, { id: 'c', text: 'dismissive of all data.' }, { id: 'd', text: 'humorous.' }], answer: 'a', explanation: 'Denying proven causation while calling for further study is cautious curiosity.' },
    { id: 'ela-x-31', type: 'multi', passage: 'Character description: Lena answers every question with a joke, changes the subject when asked about home, and volunteers for every group task.', prompt: 'Select the TWO inferences best supported by the description.', choices: [{ id: 'a', text: 'Lena may be avoiding talk about home.' }, { id: 'b', text: 'Lena prefers to keep attention on group work or humor.' }, { id: 'c', text: 'Lena has told her full life story already.' }, { id: 'd', text: 'Lena never speaks.' }], answer: ['a', 'b'], explanation: 'Changing the subject about home and using jokes/tasks fits avoidance and redirection.' },
    { id: 'ela-x-32', type: 'single', passage: 'History text: "The compromise satisfied neither extreme faction, yet it prevented an immediate collapse of talks."', prompt: 'What does the sentence reveal about the compromise?', choices: [{ id: 'a', text: 'It was imperfect but useful in the short term.' }, { id: 'b', text: 'It made everyone fully happy.' }, { id: 'c', text: 'It ended all future negotiation forever.' }, { id: 'd', text: 'It was never proposed.' }], answer: 'a', explanation: 'Neither side fully satisfied, but talks continued - imperfect short-term success.' }
  ]
};

var EXTRA_MISA_TOPIC = {
  id: 'misa-extra-practice',
  name: 'Extra Life Science Practice (Hour Pack)',
  blurb: 'Additional NGSS-aligned items across structure, energy, genetics, and evolution.',
  questions: [
    { id: 'misa-x-1', type: 'single', passage: 'PHENOMENON: Plant cells placed in salt water shrink.', prompt: 'Which explanation is best?', choices: [{ id: 'a', text: 'Water left the cells by osmosis toward the higher solute concentration outside.' }, { id: 'b', text: 'Salt created new cell walls.' }, { id: 'c', text: 'The cells performed photosynthesis faster.' }, { id: 'd', text: 'Mitochondria disappeared instantly.' }], answer: 'a', explanation: 'Hypertonic surroundings draw water out by osmosis.' },
    { id: 'misa-x-2', type: 'single', passage: 'Enzymes are proteins that speed reactions. Heating above a certain temperature often stops enzyme activity.', prompt: 'Why does extreme heat stop many enzymes?', choices: [{ id: 'a', text: 'Heat can denature the protein, changing its shape so the substrate no longer fits.' }, { id: 'b', text: 'Heat turns enzymes into DNA.' }, { id: 'c', text: 'Enzymes do not have shapes.' }, { id: 'd', text: 'Heat creates new amino acids from nothing.' }], answer: 'a', explanation: 'Denaturation alters active-site shape.' },
    { id: 'misa-x-3', type: 'multi', passage: 'A food web shows grass -> rabbit -> fox, and grass -> insect -> bird -> fox.', prompt: 'Select the TWO correct statements.', choices: [{ id: 'a', text: 'Grass is a producer.' }, { id: 'b', text: 'The fox can obtain energy from more than one pathway.' }, { id: 'c', text: 'The fox creates energy from sunlight directly.' }, { id: 'd', text: 'Insects produce all the grass.' }], answer: ['a', 'b'], explanation: 'Grass produces; fox is a secondary/tertiary consumer via multiple links.' },
    { id: 'misa-x-4', type: 'single', passage: 'During aerobic respiration, glucose and oxygen are used; carbon dioxide, water, and ATP are produced.', prompt: 'Where does most ATP production occur in eukaryotic cells?', choices: [{ id: 'a', text: 'Mitochondria' }, { id: 'b', text: 'Ribosomes' }, { id: 'c', text: 'Cell wall' }, { id: 'd', text: 'Vacuole only in all cells' }], answer: 'a', explanation: 'Mitochondria are the main site of ATP from cellular respiration.' },
    { id: 'misa-x-5', type: 'single', passage: 'A graph shows reaction rate of an enzyme rising to a peak at pH 7, then falling at higher and lower pH.', prompt: 'What does the graph indicate?', choices: [{ id: 'a', text: 'The enzyme has an optimal pH near 7.' }, { id: 'b', text: 'pH never affects enzymes.' }, { id: 'c', text: 'The enzyme works only at pH 1.' }, { id: 'd', text: 'The enzyme is DNA.' }], answer: 'a', explanation: 'Peak at pH 7 shows optimum.' },
    { id: 'misa-x-6', type: 'multi', passage: 'DNA is replicated before mitosis. Each daughter cell receives a full set of chromosomes.', prompt: 'Select the TWO statements that are true of mitosis in body cells.', choices: [{ id: 'a', text: 'It produces genetically similar daughter cells.' }, { id: 'b', text: 'DNA replication occurs before division.' }, { id: 'c', text: 'It always produces four unique gametes.' }, { id: 'd', text: 'It halves the chromosome number every time in skin cells.' }], answer: ['a', 'b'], explanation: 'Mitosis maintains chromosome number with prior replication; meiosis makes gametes.' },
    { id: 'misa-x-7', type: 'single', passage: 'In rabbits, black fur (B) is dominant to brown (b). A Bb rabbit is crossed with a bb rabbit.', prompt: 'What percent of offspring are expected to be brown?', choices: [{ id: 'a', text: '0%' }, { id: 'b', text: '50%' }, { id: 'c', text: '75%' }, { id: 'd', text: '100%' }], answer: 'b', explanation: 'Bb x bb yields 50% Bb (black) and 50% bb (brown).' },
    { id: 'misa-x-8', type: 'single', passage: 'A mutation changes one DNA base. The resulting protein is shorter than normal.', prompt: 'Which mutation type best explains a shorter protein?', choices: [{ id: 'a', text: 'A nonsense mutation that introduced an early stop codon' }, { id: 'b', text: 'A silent mutation with no amino acid change' }, { id: 'c', text: 'No mutation at all' }, { id: 'd', text: 'A mutation that only affects tRNA spelling of the organism\'s name' }], answer: 'a', explanation: 'Early stop codon truncates the protein.' },
    { id: 'misa-x-9', type: 'cr', points: 3, passage: 'PHENOMENON: After a wildfire, grasses appear first, then shrubs, then trees over many years.', prompt: 'Explain this pattern using the idea of ecological succession. Include why early species can grow first and how conditions change for later species.', sampleResponse: 'This is secondary succession. After fire, hardy early species like grasses can grow in open, disturbed soil. They change the environment by adding organic matter and stabilizing soil, making conditions more suitable for shrubs and later trees. Over time, the community shifts toward later-successional species.', rubric: ['Names succession (secondary).', 'Explains early colonizers.', 'Explains how conditions change for later species.'] },
    { id: 'misa-x-10', type: 'single', passage: 'Carbon dioxide levels rise in a sealed jar of germinating seeds kept in the dark.', prompt: 'Which process best explains the CO2 increase?', choices: [{ id: 'a', text: 'Cellular respiration by the seeds' }, { id: 'b', text: 'Photosynthesis in the dark' }, { id: 'c', text: 'Nitrogen fixation by the glass' }, { id: 'd', text: 'Osmosis of CO2 from nowhere' }], answer: 'a', explanation: 'In the dark, seeds respire and release CO2.' },
    { id: 'misa-x-11', type: 'multi', passage: 'Antibiotics kill many bacteria, but some survive and reproduce.', prompt: 'Select the TWO statements that correctly describe antibiotic resistance evolution.', choices: [{ id: 'a', text: 'Resistant bacteria were already present as variants before or arose by mutation.' }, { id: 'b', text: 'Antibiotics select for resistant survivors that pass on resistance.' }, { id: 'c', text: 'Bacteria individually decide to become resistant after thinking about it.' }, { id: 'd', text: 'Antibiotics create resistance genes from scratch in every cell at once by teaching them.' }], answer: ['a', 'b'], explanation: 'Variation + selection; individuals do not choose to evolve.' },
    { id: 'misa-x-12', type: 'single', passage: 'Stomata on leaves open and close. When open, CO2 enters but water vapor can exit.', prompt: 'This is best described as a trade-off between', choices: [{ id: 'a', text: 'gas exchange for photosynthesis and water loss.' }, { id: 'b', text: 'root growth and flower color only.' }, { id: 'c', text: 'DNA replication and translation only.' }, { id: 'd', text: 'bone strength and blood type.' }], answer: 'a', explanation: 'Open stomata allow CO2 in but risk water loss.' },
    { id: 'misa-x-13', type: 'single', passage: 'A pedigree shows a recessive trait appearing in a child of two unaffected parents.', prompt: 'What does this pattern suggest?', choices: [{ id: 'a', text: 'Both parents are likely heterozygous carriers.' }, { id: 'b', text: 'The trait is dominant and always visible in parents.' }, { id: 'c', text: 'The child has no DNA.' }, { id: 'd', text: 'Traits skip generations only when dominant.' }], answer: 'a', explanation: 'Unaffected parents producing an affected child fits recessive carriers.' },
    { id: 'misa-x-14', type: 'single', passage: 'ATP is often called the energy currency of the cell.', prompt: 'What does that mean in practice?', choices: [{ id: 'a', text: 'ATP stores energy in phosphate bonds that can be used to power cell work.' }, { id: 'b', text: 'ATP is a carbohydrate storage molecule like starch only.' }, { id: 'c', text: 'ATP is a type of virus.' }, { id: 'd', text: 'ATP permanently disappears after one use and is never remade.' }], answer: 'a', explanation: 'ATP transfers usable energy for cellular processes and is recycled.' },
    { id: 'misa-x-15', type: 'multi', passage: 'Meiosis produces gametes with half the chromosome number.', prompt: 'Select the TWO benefits of meiosis and sexual reproduction.', choices: [{ id: 'a', text: 'Increases genetic variation among offspring' }, { id: 'b', text: 'Maintains chromosome number across generations after fertilization' }, { id: 'c', text: 'Makes every offspring a clone of one parent always' }, { id: 'd', text: 'Removes the need for DNA entirely' }], answer: ['a', 'b'], explanation: 'Variation via meiosis; fertilization restores diploid number.' },
    { id: 'misa-x-16', type: 'single', passage: 'Keystone predators can increase biodiversity by preventing one prey species from dominating.', prompt: 'If a keystone predator is removed, what is a likely result?', choices: [{ id: 'a', text: 'One prey species may explode in number and reduce diversity.' }, { id: 'b', text: 'Biodiversity always increases forever.' }, { id: 'c', text: 'Photosynthesis stops worldwide.' }, { id: 'd', text: 'All mutations disappear.' }], answer: 'a', explanation: 'Without the predator, a dominant prey can outcompete others.' },
    { id: 'misa-x-17', type: 'cr', points: 3, passage: 'Data: In a moth population, dark moths increase after tree bark darkens due to pollution.', prompt: 'Explain the change using natural selection. Use variation, environment, survival, and inheritance.', sampleResponse: 'Moths already varied in color. After bark darkened, dark moths were better camouflaged from predators, so they survived and reproduced more. Offspring inherited the darker coloration, so dark moths became more common over generations.', rubric: ['Mentions existing variation.', 'Links environment to differential survival.', 'Includes inheritance/population change.'] },
    { id: 'misa-x-18', type: 'single', passage: 'Chloroplasts contain chlorophyll and are abundant in leaf mesophyll cells.', prompt: 'How does this relate structure to function?', choices: [{ id: 'a', text: 'Chloroplasts enable photosynthesis where light capture is needed.' }, { id: 'b', text: 'Chloroplasts digest food like stomach acid.' }, { id: 'c', text: 'Chloroplasts store urine.' }, { id: 'd', text: 'Chloroplasts are only found in animal muscle.' }], answer: 'a', explanation: 'Chloroplasts in leaves support photosynthetic light capture.' },
    { id: 'misa-x-19', type: 'single', passage: 'A student says, "Plants only photosynthesize; they never respire."', prompt: 'Which correction is accurate?', choices: [{ id: 'a', text: 'Plants photosynthesize and also perform cellular respiration.' }, { id: 'b', text: 'Plants never use oxygen.' }, { id: 'c', text: 'Plants only respire at noon in sunlight and never at night.' }, { id: 'd', text: 'Respiration occurs only in animals.' }], answer: 'a', explanation: 'Plant cells respire to make ATP; photosynthesis is additional.' },
    { id: 'misa-x-20', type: 'multi', passage: 'Homeostasis keeps internal conditions stable. Example: sweating when hot.', prompt: 'Select the TWO examples of homeostasis.', choices: [{ id: 'a', text: 'Sweating to cool the body' }, { id: 'b', text: 'Insulin helping lower high blood glucose' }, { id: 'c', text: 'A broken bone healing without any biological process' }, { id: 'd', text: 'Ignoring all internal changes permanently' }], answer: ['a', 'b'], explanation: 'Sweating and insulin responses stabilize internal conditions.' },
    { id: 'misa-x-21', type: 'single', passage: 'In gel electrophoresis, DNA fragments separate by size.', prompt: 'Which fragments travel farthest through the gel?', choices: [{ id: 'a', text: 'Smaller fragments' }, { id: 'b', text: 'Larger fragments' }, { id: 'c', text: 'Only RNA fragments' }, { id: 'd', text: 'Whole chromosomes only, never fragments' }], answer: 'a', explanation: 'Smaller DNA pieces move farther/faster in the gel.' },
    { id: 'misa-x-22', type: 'single', passage: 'Nitrogen-fixing bacteria live in root nodules of legumes and convert N2 into forms plants can use.', prompt: 'This relationship is best described as', choices: [{ id: 'a', text: 'mutualism that helps the nitrogen cycle.' }, { id: 'b', text: 'predation on the plant only.' }, { id: 'c', text: 'a virus infecting soil for no benefit.' }, { id: 'd', text: 'photosynthesis by the bacteria using leaf chlorophyll.' }], answer: 'a', explanation: 'Both organisms benefit; fixed nitrogen enters ecosystems.' },
    { id: 'misa-x-23', type: 'single', passage: 'A population bottleneck occurs when a disaster randomly kills most individuals.', prompt: 'What is a likely genetic result?', choices: [{ id: 'a', text: 'Reduced genetic variation in the surviving population' }, { id: 'b', text: 'Instant creation of every possible allele' }, { id: 'c', text: 'Guaranteed increase in diversity' }, { id: 'd', text: 'No effect on allele frequencies ever' }], answer: 'a', explanation: 'Bottlenecks shrink gene pools and variation.' },
    { id: 'misa-x-24', type: 'multi', passage: 'Active transport moves substances against a concentration gradient and requires energy.', prompt: 'Select the TWO features of active transport.', choices: [{ id: 'a', text: 'Requires ATP or another energy source' }, { id: 'b', text: 'Can move substances from low to high concentration' }, { id: 'c', text: 'Never uses membrane proteins' }, { id: 'd', text: 'Is identical to simple diffusion through empty space only' }], answer: ['a', 'b'], explanation: 'Energy + against gradient define active transport.' },
    { id: 'misa-x-25', type: 'cr', points: 3, passage: 'Model: Light energy -> photosynthesis -> glucose -> cellular respiration -> ATP + heat.', prompt: 'Using the model, explain why ecosystems need a continuous input of sunlight even though matter cycles.', sampleResponse: 'Matter such as carbon can cycle between CO2 and organic molecules, but energy flows one way. At each step some energy is lost as heat, so it is not fully recycled. Therefore ecosystems need continuous sunlight to replace usable energy for photosynthesis and food webs.', rubric: ['States energy flows / is lost as heat.', 'Contrasts with cycling matter.', 'Concludes sunlight input is required.'] },
    { id: 'misa-x-26', type: 'single', passage: 'Vaccines expose the immune system to a harmless form of a pathogen.', prompt: 'How do vaccines provide protection?', choices: [{ id: 'a', text: 'They help the body form memory cells that respond faster to later infection.' }, { id: 'b', text: 'They permanently remove all white blood cells.' }, { id: 'c', text: 'They replace DNA in every cell.' }, { id: 'd', text: 'They stop mitosis in skin cells only.' }], answer: 'a', explanation: 'Memory immune cells enable faster secondary response.' },
    { id: 'misa-x-27', type: 'single', passage: 'Analogous structures (like insect wings and bird wings) have similar functions but different ancestry.', prompt: 'Analogous structures are evidence of', choices: [{ id: 'a', text: 'convergent evolution under similar selective pressures.' }, { id: 'b', text: 'identical DNA in all species.' }, { id: 'c', text: 'no evolution occurring.' }, { id: 'd', text: 'homologous bones from a shared limb plan only.' }], answer: 'a', explanation: 'Similar function, different origin = convergence.' },
    { id: 'misa-x-28', type: 'single', passage: 'A freshwater fish actively pumps salts in and produces dilute urine.', prompt: 'This behavior helps the fish', choices: [{ id: 'a', text: 'maintain osmotic balance in a hypotonic environment.' }, { id: 'b', text: 'photosynthesize.' }, { id: 'c', text: 'stop all diffusion forever.' }, { id: 'd', text: 'become a saltwater species instantly.' }], answer: 'a', explanation: 'Freshwater fish manage water inflow and salt loss via osmoregulation.' },
    { id: 'misa-x-29', type: 'multi', passage: 'Transcription makes RNA from DNA; translation builds a polypeptide using ribosomes.', prompt: 'Select the TWO correct matches.', choices: [{ id: 'a', text: 'Transcription - RNA synthesis from DNA' }, { id: 'b', text: 'Translation - polypeptide synthesis at ribosomes' }, { id: 'c', text: 'Translation - DNA copying for mitosis only' }, { id: 'd', text: 'Transcription - folding of finished proteins in the Golgi only' }], answer: ['a', 'b'], explanation: 'Standard central dogma steps.' },
    { id: 'misa-x-30', type: 'single', passage: 'Invasive species often lack natural predators in a new habitat.', prompt: 'Why can invasive species harm native biodiversity?', choices: [{ id: 'a', text: 'They may outcompete natives for resources and grow without controls.' }, { id: 'b', text: 'They always help every native species equally.' }, { id: 'c', text: 'They cannot reproduce.' }, { id: 'd', text: 'They only live in laboratories.' }], answer: 'a', explanation: 'Unchecked growth and competition reduce native populations.' },
    { id: 'misa-x-31', type: 'single', passage: 'Crossing over occurs during meiosis I between homologous chromosomes.', prompt: 'What is the main result of crossing over?', choices: [{ id: 'a', text: 'New allele combinations on chromosomes' }, { id: 'b', text: 'Identical clones with zero variation always' }, { id: 'c', text: 'Removal of all genes' }, { id: 'd', text: 'Mitosis speeding up in leaf cells' }], answer: 'a', explanation: 'Crossing over shuffles alleles and increases variation.' },
    { id: 'misa-x-32', type: 'single', passage: 'Feedback: High blood sugar triggers insulin release; insulin lowers blood sugar, reducing the signal for more insulin.', prompt: 'This is an example of', choices: [{ id: 'a', text: 'negative feedback that helps maintain homeostasis.' }, { id: 'b', text: 'positive feedback that always increases sugar forever.' }, { id: 'c', text: 'speciation.' }, { id: 'd', text: 'fossil formation.' }], answer: 'a', explanation: 'Response counters the change - classic negative feedback.' }
  ]
};

var EXTRA_GOV_TOPIC = {
  id: 'gov-extra-practice',
  name: 'Extra Government Practice (Hour Pack)',
  blurb: 'Additional civics, rights, economics, and skills practice aligned to MCAP Government.',
  questions: [
    { id: 'gov-x-1', type: 'single', passage: 'The House impeaches; the Senate holds the trial.', prompt: 'This process is an example of', choices: [{ id: 'a', text: 'a check on the executive (and sometimes judicial) branch by Congress.' }, { id: 'b', text: 'the president vetoing a bill.' }, { id: 'c', text: 'judicial review only.' }, { id: 'd', text: 'a state amending the U.S. Constitution alone.' }], answer: 'a', explanation: 'Impeachment is a legislative check.' },
    { id: 'gov-x-2', type: 'single', passage: 'The Tenth Amendment reserves powers not delegated to the federal government to the states or the people.', prompt: 'This amendment supports the principle of', choices: [{ id: 'a', text: 'federalism.' }, { id: 'b', text: 'absolute monarchy.' }, { id: 'c', text: 'judicial appointments by cities only.' }, { id: 'd', text: 'ending all state governments.' }], answer: 'a', explanation: 'Reserved powers are a federalism feature.' },
    { id: 'gov-x-3', type: 'multi', passage: 'Due process appears in the 5th and 14th Amendments.', prompt: 'Select the TWO ideas closely related to due process.', choices: [{ id: 'a', text: 'Fair procedures before government takes life, liberty, or property' }, { id: 'b', text: 'Limits on arbitrary government action' }, { id: 'c', text: 'A requirement that all laws be kept secret' }, { id: 'd', text: 'Banning all court trials' }], answer: ['a', 'b'], explanation: 'Due process requires fairness and constrains arbitrary power.' },
    { id: 'gov-x-4', type: 'single', passage: 'A president negotiates a treaty; the Senate must approve it by a two-thirds vote.', prompt: 'This shared power illustrates', choices: [{ id: 'a', text: 'checks and balances in foreign policy.' }, { id: 'b', text: 'state control of treaties.' }, { id: 'c', text: 'the House electing ambassadors alone.' }, { id: 'd', text: 'the end of the Senate.' }], answer: 'a', explanation: 'Executive negotiation + Senate consent = check.' },
    { id: 'gov-x-5', type: 'single', passage: 'Gideon v. Wainwright expanded the right to counsel for defendants who cannot afford a lawyer.', prompt: 'This ruling most directly strengthened', choices: [{ id: 'a', text: 'Sixth Amendment fair-trial protections.' }, { id: 'b', text: 'the president\'s veto power.' }, { id: 'c', text: 'state control of the military only.' }, { id: 'd', text: 'tariff policy.' }], answer: 'a', explanation: 'Right to counsel is a Sixth Amendment trial right.' },
    { id: 'gov-x-6', type: 'single', passage: 'Interest rates set by the Federal Reserve are a tool of monetary policy.', prompt: 'Raising interest rates is generally intended to', choices: [{ id: 'a', text: 'cool borrowing and help control inflation.' }, { id: 'b', text: 'appoint Supreme Court justices.' }, { id: 'c', text: 'pass constitutional amendments.' }, { id: 'd', text: 'redraw voting districts.' }], answer: 'a', explanation: 'Higher rates discourage borrowing, cooling the economy.' },
    { id: 'gov-x-7', type: 'multi', passage: 'Civic duties vs responsibilities: paying taxes and serving on a jury are often listed as duties; voting is a key responsibility in a democracy.', prompt: 'Select the TWO items typically treated as civic duties (required).', choices: [{ id: 'a', text: 'Paying legally required taxes' }, { id: 'b', text: 'Jury duty when summoned' }, { id: 'c', text: 'Joining a political party' }, { id: 'd', text: 'Running for president' }], answer: ['a', 'b'], explanation: 'Taxes and jury service are required; party membership and candidacy are optional.' },
    { id: 'gov-x-8', type: 'single', passage: 'The Elastic Clause allows Congress to make laws "necessary and proper" for carrying out listed powers.', prompt: 'This clause has mainly allowed Congress to', choices: [{ id: 'a', text: 'adapt federal power to new needs while tied to enumerated powers.' }, { id: 'b', text: 'abolish the presidency.' }, { id: 'c', text: 'ignore the Bill of Rights entirely with no review.' }, { id: 'd', text: 'elect state governors.' }], answer: 'a', explanation: 'Necessary and proper expands means, not unlimited ends.' },
    { id: 'gov-x-9', type: 'cr', points: 3, passage: 'Scenario: A state wants to set a higher minimum wage than the federal minimum. A business argues only Congress can set wages.', prompt: 'Using federalism, explain whether a state can generally set a higher minimum wage and why.', sampleResponse: 'Under federalism, states may often provide greater worker protections than the federal floor if they do not conflict with federal law. A higher state minimum wage typically does not block federal rules; it adds a stricter state standard. Congress sets a federal minimum, but states retain police powers to regulate local economic conditions more strictly.', rubric: ['Uses federalism accurately.', 'Explains state vs federal roles.', 'Applies to the wage scenario.'] },
    { id: 'gov-x-10', type: 'single', passage: 'Brown v. Board of Education (1954) held that segregated public schools were unconstitutional.', prompt: 'The decision primarily enforced', choices: [{ id: 'a', text: 'Equal Protection under the 14th Amendment.' }, { id: 'b', text: 'the president\'s commander-in-chief power.' }, { id: 'c', text: 'state nullification of all federal courts.' }, { id: 'd', text: 'a new tax on schools.' }], answer: 'a', explanation: 'Segregation violated equal protection.' },
    { id: 'gov-x-11', type: 'single', passage: 'A free press can investigate government wrongdoing and inform voters.', prompt: 'Why is freedom of the press important in a democracy?', choices: [{ id: 'a', text: 'It helps citizens hold leaders accountable with information.' }, { id: 'b', text: 'It requires the government to write all news.' }, { id: 'c', text: 'It bans criticism of officials.' }, { id: 'd', text: 'It replaces elections.' }], answer: 'a', explanation: 'Informed scrutiny supports accountability.' },
    { id: 'gov-x-12', type: 'multi', passage: 'Concurrent powers are shared by national and state governments.', prompt: 'Select the TWO concurrent powers.', choices: [{ id: 'a', text: 'Taxation' }, { id: 'b', text: 'Establishing courts' }, { id: 'c', text: 'Coining money (states alone)' }, { id: 'd', text: 'Declaring war (states alone)' }], answer: ['a', 'b'], explanation: 'Tax and courts are shared; coining money and war are national.' },
    { id: 'gov-x-13', type: 'single', passage: 'Lobbyists provide information to lawmakers and advocate for interest groups.', prompt: 'A potential concern about lobbying is that', choices: [{ id: 'a', text: 'well-funded groups may have unequal influence compared with ordinary citizens.' }, { id: 'b', text: 'lobbying is identical to voting in a booth.' }, { id: 'c', text: 'lobbyists write Supreme Court opinions.' }, { id: 'd', text: 'lobbying abolishes Congress.' }], answer: 'a', explanation: 'Unequal resources can skew influence.' },
    { id: 'gov-x-14', type: 'single', passage: 'A progressive tax takes a larger percentage from higher incomes.', prompt: 'Which statement describes a progressive income tax?', choices: [{ id: 'a', text: 'Higher earners pay a higher rate on additional income brackets.' }, { id: 'b', text: 'Everyone pays the exact same dollar amount.' }, { id: 'c', text: 'Only the poorest pay taxes.' }, { id: 'd', text: 'There are no tax brackets.' }], answer: 'a', explanation: 'Progressive rates rise with income.' },
    { id: 'gov-x-15', type: 'single', passage: 'The Supremacy Clause says the Constitution and federal laws made under it are the supreme law of the land.', prompt: 'If a state law conflicts with a valid federal law,', choices: [{ id: 'a', text: 'the federal law generally prevails.' }, { id: 'b', text: 'the state law always wins.' }, { id: 'c', text: 'neither law matters.' }, { id: 'd', text: 'cities veto Congress.' }], answer: 'a', explanation: 'Supremacy favors valid federal law over conflicting state law.' },
    { id: 'gov-x-16', type: 'multi', passage: 'Political socialization is how people form political attitudes.', prompt: 'Select the TWO common agents of political socialization.', choices: [{ id: 'a', text: 'Family' }, { id: 'b', text: 'Schools and media' }, { id: 'c', text: 'The color of a random street sign with no message' }, { id: 'd', text: 'A law banning all opinions' }], answer: ['a', 'b'], explanation: 'Family, school, and media shape political views.' },
    { id: 'gov-x-17', type: 'cr', points: 3, passage: 'Source note: A mayor proposes a curfew for teens after a rise in late-night incidents. Supporters cite safety. Opponents cite freedom of movement and unequal enforcement concerns.', prompt: 'Write a short argument for OR against the curfew. Use one supporting reason and fairly state one opposing concern.', sampleResponse: 'I oppose a blanket teen curfew. While supporters fairly want safety after late-night incidents, a curfew restricts freedom of movement for law-abiding teens and risks unequal enforcement. Targeted policing of actual crimes and better lighting/transit would address safety without treating all teens as suspects.', rubric: ['Clear position.', 'One supporting reason.', 'Fair opposing concern.'] },
    { id: 'gov-x-18', type: 'single', passage: 'The Electoral College elects the president; most states use winner-take-all for electors.', prompt: 'A criticism of winner-take-all electors is that', choices: [{ id: 'a', text: 'popular-vote minorities in a state may receive no electors.' }, { id: 'b', text: 'it guarantees every vote counts equally in every state always.' }, { id: 'c', text: 'it abolishes the presidency.' }, { id: 'd', text: 'governors choose the president alone.' }], answer: 'a', explanation: 'Winner-take-all can discard statewide minority popular votes for electors.' },
    { id: 'gov-x-19', type: 'single', passage: 'Miranda v. Arizona required police to inform suspects of rights before custodial interrogation.', prompt: 'Miranda warnings protect', choices: [{ id: 'a', text: 'the right to remain silent and to an attorney.' }, { id: 'b', text: 'the right to declare war.' }, { id: 'c', text: 'unlimited search without cause.' }, { id: 'd', text: 'state secession.' }], answer: 'a', explanation: 'Miranda centers on silence and counsel during interrogation.' },
    { id: 'gov-x-20', type: 'single', passage: 'A public good is nonexcludable and nonrival, like national defense.', prompt: 'Why does government often provide public goods?', choices: [{ id: 'a', text: 'Private markets may underprovide goods people can use without paying.' }, { id: 'b', text: 'Public goods cannot exist.' }, { id: 'c', text: 'Only corporations can defend a country.' }, { id: 'd', text: 'Public goods are the same as private sandwiches.' }], answer: 'a', explanation: 'Free-rider problems lead to underprovision without government.' },
    { id: 'gov-x-21', type: 'multi', passage: 'Separation of powers assigns lawmaking, enforcing, and interpreting to different branches.', prompt: 'Select the TWO correct matches.', choices: [{ id: 'a', text: 'Legislative - makes laws' }, { id: 'b', text: 'Judicial - interprets laws' }, { id: 'c', text: 'Executive - makes all constitutional amendments alone' }, { id: 'd', text: 'Judicial - commands the military as primary role' }], answer: ['a', 'b'], explanation: 'Congress legislates; courts interpret; executive enforces / commander-in-chief.' },
    { id: 'gov-x-22', type: 'single', passage: 'Civil liberties are protections from government; civil rights involve equal treatment under law.', prompt: 'Which example best fits civil rights?', choices: [{ id: 'a', text: 'Laws banning discrimination in public accommodations' }, { id: 'b', text: 'Freedom from unreasonable searches' }, { id: 'c', text: 'The right to a lawyer during interrogation only' }, { id: 'd', text: 'Freedom of speech alone' }], answer: 'a', explanation: 'Equal access/nondiscrimination is a civil rights focus; B/C/D are liberties examples.' },
    { id: 'gov-x-23', type: 'single', passage: 'A filibuster in the Senate can delay a vote unless cloture is reached.', prompt: 'The filibuster most directly affects', choices: [{ id: 'a', text: 'how quickly the Senate can pass legislation.' }, { id: 'b', text: 'state sales tax rates only.' }, { id: 'c', text: 'city zoning only.' }, { id: 'd', text: 'Supreme Court oral argument time exclusively.' }], answer: 'a', explanation: 'Filibusters slow or block Senate action.' },
    { id: 'gov-x-24', type: 'multi', passage: 'Scarcity means unlimited wants and limited resources.', prompt: 'Select the TWO statements that follow from scarcity.', choices: [{ id: 'a', text: 'People and governments must make trade-offs.' }, { id: 'b', text: 'Opportunity cost exists when choosing one option over another.' }, { id: 'c', text: 'All goods are free and unlimited.' }, { id: 'd', text: 'Choices are never necessary.' }], answer: ['a', 'b'], explanation: 'Scarcity forces trade-offs and opportunity costs.' },
    { id: 'gov-x-25', type: 'cr', points: 4, passage: 'Excerpt from a civic lesson: "Federal judges are appointed for life during good behavior so they can decide cases without fear of losing their jobs over unpopular rulings. Critics argue life tenure can make judges unaccountable. Supporters say independence protects minority rights and the Constitution."', prompt: 'Should federal judges continue to have life tenure? Take a position, use two ideas from the excerpt, and address the other side.', sampleResponse: 'Federal judges should keep life tenure. The excerpt notes tenure lets judges decide "without fear of losing their jobs over unpopular rulings," which protects constitutional rights even when majorities object. Critics fairly worry judges can become "unaccountable," but removal for misbehavior and the amendment process still constrain abuse, while short terms could pressure judges to please voters or politicians instead of the law.', rubric: ['Clear position.', 'Two excerpt-based points.', 'Addresses opposing view.', 'Organized response.'] },
    { id: 'gov-x-26', type: 'single', passage: 'Redistricting redraws legislative districts, often after the census.', prompt: 'Gerrymandering refers to', choices: [{ id: 'a', text: 'drawing districts to favor a party or group unfairly.' }, { id: 'b', text: 'counting electoral votes in Congress.' }, { id: 'c', text: 'confirming cabinet secretaries.' }, { id: 'd', text: 'writing jury instructions.' }], answer: 'a', explanation: 'Gerrymandering manipulates district lines for advantage.' },
    { id: 'gov-x-27', type: 'single', passage: 'A budget deficit occurs when spending exceeds revenue in a year; the national debt is the accumulation of borrowing over time.', prompt: 'Which statement is accurate?', choices: [{ id: 'a', text: 'Repeated deficits can increase the national debt.' }, { id: 'b', text: 'Deficit and debt are always identical numbers the same year.' }, { id: 'c', text: 'Debt disappears whenever there is any deficit.' }, { id: 'd', text: 'Budgets never involve trade-offs.' }], answer: 'a', explanation: 'Deficits add to accumulated debt when financed by borrowing.' },
    { id: 'gov-x-28', type: 'single', passage: 'Tinker v. Des Moines protected students\' symbolic speech at school unless it substantially disrupts learning.', prompt: 'According to Tinker, student speech can be limited when it', choices: [{ id: 'a', text: 'materially and substantially disrupts school.' }, { id: 'b', text: 'is unpopular with one teacher.' }, { id: 'c', text: 'mentions any political idea.' }, { id: 'd', text: 'occurs after school off campus only with no rule.' }], answer: 'a', explanation: 'Substantial disruption is the key school-speech limit from Tinker.' },
    { id: 'gov-x-29', type: 'multi', passage: 'Rule of law means officials and citizens are accountable to the same laws.', prompt: 'Select the TWO examples that reflect rule of law.', choices: [{ id: 'a', text: 'Leaders can be investigated for breaking laws' }, { id: 'b', text: 'Courts apply legal standards rather than personal favoritism' }, { id: 'c', text: 'Officials are above all laws forever' }, { id: 'd', text: 'Laws change based on who is friends with the judge' }], answer: ['a', 'b'], explanation: 'Accountability and neutral legal standards embody rule of law.' },
    { id: 'gov-x-30', type: 'single', passage: 'A referendum lets voters approve or reject a law; an initiative lets citizens propose laws/amendments for a vote.', prompt: 'These tools are examples of', choices: [{ id: 'a', text: 'direct democracy features used in some states.' }, { id: 'b', text: 'presidential vetoes.' }, { id: 'c', text: 'martial law.' }, { id: 'd', text: 'original jurisdiction of the Supreme Court only.' }], answer: 'a', explanation: 'Initiatives/referenda are direct democracy mechanisms.' },
    { id: 'gov-x-31', type: 'single', passage: 'Opportunity cost is the next-best alternative given up when a choice is made.', prompt: 'If a city spends surplus funds on a new park instead of road repairs, the opportunity cost is', choices: [{ id: 'a', text: 'the road repairs not undertaken.' }, { id: 'b', text: 'the park\'s existence alone with no trade-off.' }, { id: 'c', text: 'zero, because surplus funds have no alternatives.' }, { id: 'd', text: 'the mayor\'s salary only.' }], answer: 'a', explanation: 'The forgone road repairs are the opportunity cost.' },
    { id: 'gov-x-32', type: 'single', passage: 'Popular sovereignty means government authority comes from the people.', prompt: 'Which practice best reflects popular sovereignty?', choices: [{ id: 'a', text: 'Regular free elections' }, { id: 'b', text: 'Hereditary absolute rule with no consent' }, { id: 'c', text: 'Banning all voting' }, { id: 'd', text: 'Secret laws never disclosed' }], answer: 'a', explanation: 'Elections express consent of the governed.' }
  ]
};

const subjects = [ela, misa, government];

const themes = {
 ela: { soft: 'bg-blue-50', text: 'text-blue-700', btn: 'bg-blue-600 hover:bg-blue-700', bar: 'bg-blue-500', chip: 'bg-blue-100 text-blue-800', grad: 'from-blue-500 to-blue-700', dot: 'bg-blue-500', ring: 'ring-blue-200', border: 'border-blue-500' },
 misa: { soft: 'bg-emerald-50', text: 'text-emerald-700', btn: 'bg-emerald-600 hover:bg-emerald-700', bar: 'bg-emerald-500', chip: 'bg-emerald-100 text-emerald-800', grad: 'from-emerald-500 to-emerald-700', dot: 'bg-emerald-500', ring: 'ring-emerald-200', border: 'border-emerald-500' },
 gov: { soft: 'bg-rose-50', text: 'text-rose-700', btn: 'bg-rose-600 hover:bg-rose-700', bar: 'bg-rose-500', chip: 'bg-rose-100 text-rose-800', grad: 'from-rose-500 to-red-700', dot: 'bg-rose-500', ring: 'ring-rose-200', border: 'border-rose-500' }
};

function themeOf(s) { return themes[s.theme] || themes.ela; }
function countQ(s) { return s.topics.reduce(function (n, t) { return n + t.questions.length; }, 0); }

function shuffle(arr) {
 var a = arr.slice();
 for (var i = a.length - 1; i > 0; i--) {
 var j = Math.floor(Math.random() * (i + 1));
 var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
 }
 return a;
}

function sameSet(a, b) {
 a = a || []; b = b || [];
 if (a.length !== b.length) return false;
 var sb = {};
 for (var i = 0; i < b.length; i++) sb[b[i]] = true;
 for (var j = 0; j < a.length; j++) if (!sb[a[j]]) return false;
 return true;
}

function readProgress() {
 try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); }
 catch (e) { return {}; }
}

function writeProgress(data) {
 try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch (e) {}
}

function statsFor(slug) {
 var data = readProgress();
 var subject = subjects.find(function (s) { return s.slug === slug; });
 var total = countQ(subject);
 var entry = data[slug];
 if (!entry) return { total: total, answered: 0, correct: 0, pct: 0, accuracy: 0, sessions: [] };
 var answered = Object.keys(entry.answered || {}).length;
 var correct = Object.keys(entry.correct || {}).length;
 return {
 total: total,
 answered: answered,
 correct: correct,
 pct: total ? Math.round((answered / total) * 100) : 0,
 accuracy: answered ? Math.round((correct / answered) * 100) : 0,
 sessions: entry.sessions || []
 };
}

function recordSession(slug, label, results) {
 var data = readProgress();
 var subject = data[slug] || { answered: {}, correct: {}, sessions: [] };
 var answered = Object.assign({}, subject.answered);
 var correct = Object.assign({}, subject.correct);
 var score = 0;
 results.forEach(function (r) {
 answered[r.id] = true;
 if (r.isCorrect) { correct[r.id] = true; score++; }
 else if (r.selfGraded === false) delete correct[r.id];
 });
 var gradable = results.filter(function (r) { return r.gradable; });
 var sessions = (subject.sessions || []).concat([{
 ts: Date.now(), label: label, score: score, total: gradable.length, count: results.length
 }]).slice(-25);
 data[slug] = { answered: answered, correct: correct, sessions: sessions };
 writeProgress(data);
}

function esc(str) {
 return String(str == null ? '' : str)
 .replace(/&/g, '&amp;')
 .replace(/</g, '&lt;')
 .replace(/>/g, '&gt;')
 .replace(/"/g, '&quot;');
}

function nl(str) {
 return esc(str).replace(/\n/g, '<br>');
}

var state = {

 mode: null,
 questions: [],
 label: '',
 ebas: null,
 index: 0,
 answers: {},
 checked: {},
 selfGrade: {},
 ebasOpen: true,
 _lastResults: null
};

var app = document.getElementById('app');

function goHome() { state.view = 'home'; render(); }
function goSubject(slug) { state.view = 'subject'; state.slug = slug; render(); }

function startQuiz(slug, mode) {
 var subject = subjects.find(function (s) { return s.slug === slug; });
 var questions, label, ebas = null;
 if (mode === 'full') {
 questions = shuffle(subject.topics.reduce(function (all, t) {
 return all.concat(t.questions.map(function (q) {
 var copy = Object.assign({ topicName: t.name }, q);
 if (t.ebas) copy.ebas = t.ebas;
 return copy;
 }));
 }, []));
 label = subject.name + ' - Full practice test';
 } else {
 var topic = subject.topics.find(function (t) { return t.id === mode; });
 questions = shuffle(topic.questions);
 label = subject.name + ' - ' + topic.name;
 ebas = topic.ebas || null;
 }
 state.view = 'quiz';
 state.slug = slug;
 state.mode = mode;
 state.questions = questions;
 state.label = label;
 state.ebas = ebas;
 state.index = 0;
 state.answers = {};
 state.checked = {};
 state.selfGrade = {};
 state.ebasOpen = true;
 render();
}

function finishQuiz() {
 var results = state.questions.map(function (q) {
 if (q.type === 'cr') {
 var graded = state.selfGrade[q.id];
 return { id: q.id, gradable: graded !== undefined, isCorrect: graded === true, selfGraded: graded };
 }
 var ok = q.type === 'single'
 ? state.answers[q.id] === q.answer
 : sameSet(state.answers[q.id] || [], q.answer || []);
 return { id: q.id, gradable: true, isCorrect: ok };
 });
 recordSession(state.slug, state.label, results);
 state.view = 'results';
 state._lastResults = results;
 render();
}

}

 '<button data-action="prev" ' + (state.index === 0 ? 'disabled' : '') + ' class="rounded-xl bg-white px-4 py-2.5 text-sm font-semibold text-slate-700 ring-1 ring-slate-200 disabled:opacity-40">&lt;- Previous</button>' +
 '<div class="flex flex-wrap gap-2 justify-end">' +
 '<button data-action="check" ' + (canCheck ? '' : 'disabled') + ' class="rounded-xl bg-white px-4 py-2.5 text-sm font-semibold text-slate-700 ring-1 ring-slate-200 disabled:opacity-40">' + checkLabel + '</button>' +
 '<button data-action="next" class="rounded-xl px-4 py-2.5 text-sm font-semibold text-white ' + t.btn + '">' + (isLast ? 'Finish and see score' : 'Next question -&gt;') + '</button>' +
 '</div>';

 return '<main class="mx-auto max-w-3xl px-4 py-8">' +
 '<div class="mb-4 flex justify-between"><button data-action="subject" data-slug="' + s.slug + '" class="text-sm font-semibold text-slate-500 hover:text-slate-900">&lt;- Exit</button><span class="text-sm font-semibold text-slate-500">Question ' + (state.index + 1) + ' of ' + state.questions.length + '</span></div>' +
 '<div class="h-2 rounded-full bg-slate-100"><div class="h-2 rounded-full ' + t.bar + ' transition-all" style="width:' + progressPct + '%"></div></div>' +
 '<div class="mt-3 flex flex-wrap gap-2">' +
 '<span class="rounded-full px-2.5 py-1 text-xs font-semibold ' + t.chip + '">' + esc(state.label) + '</span>' +
 (q.topicName && state.mode === 'full' ? '<span class="rounded-full bg-slate-100 px-2.5 py-1 text-xs font-semibold text-slate-600">' + esc(q.topicName) + '</span>' : '') +
 '<span class="rounded-full bg-slate-100 px-2.5 py-1 text-xs font-semibold text-slate-600">' + typeLabel + '</span></div>' +
 ebasHtml +
 '<div class="mt-4 rounded-2xl bg-white p-6 shadow-sm ring-1 ring-slate-100">' +
 (q.passage ? '<div class="mb-5 whitespace-pre-line rounded-xl border-l-4 border-slate-300 bg-slate-50 p-4 text-[15px] leading-relaxed text-slate-600">' + nl(q.passage) + '</div>' : '') +
 '<h2 class="text-lg font-semibold leading-snug">' + esc(q.prompt) + '</h2>' +
 body + feedback +
 (q.type === 'cr' ? '<p class="mt-4 text-xs text-slate-500">Tip: You can move to the next question anytime. Revealing the model and self-grading are optional.</p>' : '') +
 '<div class="mt-6 flex flex-wrap items-center justify-between gap-3">' + navButtons + '</div></div></main>';
}

function renderResults() {
 var s = subjects.find(function (x) { return x.slug === state.slug; });
 var t = themeOf(s);
 var results = state._lastResults || [];
 var gradable = results.filter(function (r) { return r.gradable; });
 var correct = gradable.filter(function (r) { return r.isCorrect; }).length;
 var pct = gradable.length ? Math.round((correct / gradable.length) * 100) : 0;
 var msg = pct >= 80 ? 'Excellent - you have a strong command of this material.'
 : pct >= 60 ? 'Good work. Review the items you missed and try again.'
 : 'Keep going - repetition here is exactly how you build the score you want.';

 return '<main class="mx-auto max-w-2xl px-4 py-8">' +
 '<div class="overflow-hidden rounded-2xl bg-white shadow-sm ring-1 ring-slate-100">' +
 '<div class="bg-gradient-to-br ' + t.grad + ' p-8 text-center text-white">' +
 '<p class="text-sm font-semibold uppercase tracking-wide text-white/80">' + esc(state.label) + '</p>' +
 '<div class="mt-3 text-6xl font-extrabold">' + pct + '%</div>' +
 '<p class="mt-2 text-white/90">' + correct + ' of ' + gradable.length + ' scored items correct</p></div>' +
 '<div class="p-6 text-center"><p class="text-sm text-slate-500">' + msg + '</p>' +
 '<div class="mt-6 flex flex-wrap justify-center gap-3">' +
 '<button data-action="quiz" data-slug="' + s.slug + '" data-mode="' + state.mode + '" class="rounded-xl px-4 py-2.5 text-sm font-semibold text-white ' + t.btn + '">Try this set again</button>' +
 '<button data-action="subject" data-slug="' + s.slug + '" class="rounded-xl bg-white px-4 py-2.5 text-sm font-semibold text-slate-700 ring-1 ring-slate-200">Back to ' + esc(s.name) + '</button>' +
 '<button data-action="home" class="rounded-xl bg-white px-4 py-2.5 text-sm font-semibold text-slate-700 ring-1 ring-slate-200">All tests</button>' +
 '</div></div></div></main>';
}

function bind() {
 var nodes = app.querySelectorAll('[data-action]');
 for (var i = 0; i < nodes.length; i++) {
 (function (el) {
 var action = el.getAttribute('data-action');
 if (action === 'text') {
 el.addEventListener('input', function (e) {
 var q = state.questions[state.index];
 state.answers[q.id] = e.target.value;
 });
 return;
 }
 el.addEventListener('click', function () {
 if (action === 'home') goHome();
 else if (action === 'subject') goSubject(el.getAttribute('data-slug'));
 else if (action === 'quiz') startQuiz(el.getAttribute('data-slug'), el.getAttribute('data-mode'));
 else if (action === 'reset') {
 if (confirm('Reset progress for this subject?')) {
 var data = readProgress();
 delete data[el.getAttribute('data-slug')];
 writeProgress(data);
 render();
 }
 } else if (action === 'choose') {
 var q = state.questions[state.index];
 if (state.checked[q.id]) return;
 var cid = el.getAttribute('data-cid');
 if (q.type === 'multi') {
 var cur = Array.isArray(state.answers[q.id]) ? state.answers[q.id].slice() : [];
 var idx = cur.indexOf(cid);
 if (idx >= 0) cur.splice(idx, 1); else cur.push(cid);
 state.answers[q.id] = cur;
 } else {
 state.answers[q.id] = cid;
 }
 render();
 } else if (action === 'check') {
 state.checked[state.questions[state.index].id] = true;
 render();
 } else if (action === 'next') {
 if (state.index === state.questions.length - 1) finishQuiz();
 else { state.index++; render(); }
 } else if (action === 'prev') {
 if (state.index > 0) { state.index--; render(); }
 } else if (action === 'grade') {
 state.selfGrade[state.questions[state.index].id] = el.getAttribute('data-val') === 'true';
 render();
 } else if (action === 'toggle-ebas') {
 state.ebasOpen = !state.ebasOpen;
 render();
 }
 });
 })(nodes[i]);
 }
}

render();

 </script>
</body>
</html>
